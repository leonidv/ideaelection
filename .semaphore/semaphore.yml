version: v1.0
name: Java
agent:
  machine:
    type: e1-standard-2
  containers:
    - name: main
      image: semaphoreci/openjdk:11.0.1-jdk-slim-stretch

blocks:
  - name: Gradle
    task:
      jobs:
        - name: Build
          commands:
            - java -version
            - checkout
            - cd backend
            - ./gradlew -v
            - ./gradlew build
