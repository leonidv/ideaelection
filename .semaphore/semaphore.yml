version: v1.0
name: Idea Elections
agent:
  machine:
    type: e1-standard-2
    os_image: ubuntu1804

blocks:
  - name: Backend building
    task:
      prologue:
        commands:
          - docker run -d --name db -p 8091-8094:8091-8094 -p 11210:11210 couchbase:community-6.5.0
          - cache restore gradle
          - sleep 5
          - sem-version java 11
      epilogue:
        commands:
          - cache store gradle $USER_HOME/.gradle

      jobs:
        - name: Build backend application
          commands:
            - java -version
            - checkout
            - cd backend
            - ./gradlew -v
            - ./gradlew bootJar

  - name: Test backend API
    task:
      jobs:
        - name: testing
          commands:
            - ls -l
